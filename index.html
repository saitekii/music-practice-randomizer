<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0b12">
  <title>Music Practice Randomizer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('mpr_theme');
      var auto = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', saved || auto);
    }());
  </script>
</head>
<body>
  <div class="app">
    <header>
      <h1>Music Practice Randomizer</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode">
        <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"></svg>
      </button>
    </header>

    <main>
      <div id="rtDisplay" class="rt-display" aria-live="polite"></div>

      <div class="prompt-card" id="promptCard">
        <div class="prompt-text">
          <span class="prompt-line" id="promptLine1"></span>
          <span class="prompt-line secondary" id="promptLine2"></span>
        </div>
      </div>

      <div class="controls">
        <button class="back-btn" id="backBtn" type="button" aria-label="Previous prompt" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="next-btn" id="nextBtn">Next Prompt</button>
        <div class="right-controls">
          <div class="timer-display" id="timerDisplay"></div>
          <button class="hear-btn hidden" id="hearBtn" type="button" aria-label="Hear target notes">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </button>
          <button class="hold-btn hidden" id="holdBtn" type="button" aria-label="Hold current prompt" aria-pressed="false">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          </button>
        </div>
      </div>
      <p class="kbd-hint">or press <kbd>Space</kbd></p>
      <div class="midi-row">
        <button id="midiBtn" class="midi-btn" type="button">MIDI</button>
        <span id="midiStatus" class="midi-status"></span>
        <div id="synthVolWrap" class="synth-vol-wrap hidden">
          <select id="synthPreset" class="synth-preset">
            <option value="Rhodes">Rhodes</option>
            <option value="Organ">Organ</option>
            <option value="Pad">Pad</option>
            <option value="Bell">Bell</option>
            <option value="Pluck">Pluck</option>
          </select>
          <label class="synth-vol-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input type="range" id="synthVolume" min="0" max="100" value="70">
          </label>
        </div>
      </div>

      <div id="midiStats" class="midi-stats hidden"></div>
      <div id="pianoKeyboard" class="piano-keyboard hidden"></div>

      <div id="sessionCountdown" class="session-countdown hidden" role="timer" aria-live="off">
        <div class="session-cd-row">
          <span id="sessionTimeDisplay" class="session-cd-time">5:00</span>
          <span id="sessionCdMeta" class="session-cd-label">remaining</span>
          <button id="sessionStopBtn" class="session-cd-stop" type="button">Stop</button>
        </div>
        <div class="session-cd-track">
          <div id="sessionProgressFill" class="session-cd-fill"></div>
        </div>
      </div>
    </main>

    <section class="settings">

      <!-- Learning Path -->
      <div class="settings-group">
        <button class="group-toggle" aria-expanded="true">
          <span>Learning Path <span id="learningHeaderLabel" class="settings-hint"></span></span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="group-body">
          <div class="group-body-inner">

            <div id="pathStart">
              <p class="path-intro">New to your instrument? Start here — tiny steps from finding your first note all the way to seventh chords.</p>
              <button id="startPathBtn" class="path-start-btn" type="button">Start from scratch</button>
            </div>

            <div id="pathActive" class="hidden">
              <div class="path-stage-header">
                <span id="pathStageNum" class="path-stage-num">Stage 1 of 41</span>
                <span id="pathStageName" class="path-stage-name"></span>
              </div>
              <p id="pathStageHint" class="path-stage-hint"></p>
              <div class="path-progress-track">
                <div id="pathProgressFill" class="path-progress-fill"></div>
              </div>
              <div class="path-nav">
                <button id="stagePrevBtn" class="path-nav-btn" type="button">← Easier</button>
                <button id="stageNextBtn" class="path-nav-btn" type="button">Harder →</button>
              </div>
              <button id="leavePathBtn" class="path-leave-btn" type="button">Leave path</button>
            </div>

          </div>
        </div>
      </div>

      <!-- Practice session timer -->
      <div class="settings-group">
        <button class="group-toggle" aria-expanded="true">
          <span>Practice Timer</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="group-body">
          <div class="group-body-inner">
            <div class="duration-pills" role="group" aria-label="Practice session duration">
              <button class="duration-pill selected" data-mins="5" type="button">5 min</button>
              <button class="duration-pill" data-mins="10" type="button">10 min</button>
              <button class="duration-pill" data-mins="15" type="button">15 min</button>
              <button class="duration-pill" data-mins="20" type="button">20 min</button>
              <button class="duration-pill" data-mins="30" type="button">30 min</button>
            </div>
            <button id="sessionStartBtn" class="session-start-btn" type="button">Start</button>
          </div>
        </div>
      </div>

      <!-- Prompt timer (auto-advance per prompt) -->
      <div class="settings-group">
        <button class="group-toggle" aria-expanded="true">
          <span>Timer</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="group-body">
          <div class="group-body-inner">
            <div class="timer-options" role="group" aria-label="Timer interval">
              <label class="radio-pill"><input type="radio" name="timer" value="off" checked> Off</label>
              <label class="radio-pill"><input type="radio" name="timer" value="3"> 3s</label>
              <label class="radio-pill"><input type="radio" name="timer" value="5"> 5s</label>
              <label class="radio-pill"><input type="radio" name="timer" value="10"> 10s</label>
              <label class="radio-pill"><input type="radio" name="timer" value="15"> 15s</label>
              <label class="radio-pill"><input type="radio" name="timer" value="custom"> Custom</label>
              <label class="radio-pill"><input type="radio" name="timer" value="metronome"> Metronome</label>
            </div>

            <div id="customTimerRow" class="custom-timer-row hidden">
              <input type="number" id="customTimer" min="1" max="300" value="10" disabled>
              <span>seconds</span>
            </div>

            <div id="metroPanel" class="metro-panel hidden">
              <div class="metro-row">
                <span class="metro-label">BPM</span>
                <input type="number" id="metroBpm" min="20" max="300" value="120">
                <button id="tapBtn" type="button">Tap</button>
              </div>
              <div class="metro-row">
                <span class="metro-label">Change every</span>
                <select id="metroNoteDuration">
                  <option value="4">Whole note</option>
                  <option value="2">Half note</option>
                  <option value="1">Quarter note</option>
                  <option value="8">2 bars</option>
                </select>
              </div>
              <div class="metro-row">
                <span class="metro-label">Time sig</span>
                <select id="metroTimeSig">
                  <option value="4">4 / 4</option>
                  <option value="3">3 / 4</option>
                  <option value="5">5 / 4</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Categories -->
      <div class="settings-group">
        <button class="group-toggle" aria-expanded="true">
          <span>Categories</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="group-body">
          <div class="group-body-inner">

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catNotes"> Note Finder
              </label>
            </div>

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catChords" checked> Chords
              </label>
              <div class="category-options" id="chordsOptions" role="group" aria-label="Chord types">
                <label><input type="checkbox" id="chordMajor" checked> Major</label>
                <label><input type="checkbox" id="chordMinor" checked> Minor</label>
                <label><input type="checkbox" id="chordDiminished" checked> Diminished</label>
                <label><input type="checkbox" id="chordAugmented" checked> Augmented</label>
                <label><input type="checkbox" id="chordMaj7" checked> Major 7</label>
                <label><input type="checkbox" id="chordMin7" checked> Minor 7</label>
                <label><input type="checkbox" id="chordDom7" checked> Dominant 7</label>
                <div class="option-divider">Jazz Extensions</div>
                <label><input type="checkbox" id="chordSus2"> sus2</label>
                <label><input type="checkbox" id="chordSus4"> sus4</label>
                <label><input type="checkbox" id="chord7sus4"> 7sus4</label>
                <label><input type="checkbox" id="chordDom9"> Dominant 9</label>
                <label><input type="checkbox" id="chordMaj9"> Major 9</label>
                <label><input type="checkbox" id="chordMin9"> Minor 9</label>
                <label><input type="checkbox" id="chordDom13"> Dominant 13</label>
                <label><input type="checkbox" id="chord7b9"> 7&#x266D;9</label>
                <label><input type="checkbox" id="chord7s9"> 7&#x266F;9</label>
                <label><input type="checkbox" id="chord7s11"> 7&#x266F;11</label>
                <label><input type="checkbox" id="chordHalfDim"> Minor 7&#x266D;5</label>
                <label><input type="checkbox" id="chordDim7"> Diminished 7</label>
                <label class="inversion-toggle"><input type="checkbox" id="inversions"> Enable Inversions</label>
              </div>
            </div>

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catScales" checked> Scales
              </label>
              <div class="category-options" id="scalesOptions" role="group" aria-label="Scale types">
                <label><input type="checkbox" id="scaleMajor" checked> Major</label>
                <label><input type="checkbox" id="scaleNatMinor" checked> Natural minor</label>
                <label><input type="checkbox" id="scaleHarmMinor" checked> Harmonic minor</label>
                <label><input type="checkbox" id="scaleMelMinor" checked> Melodic minor</label>
                <label><input type="checkbox" id="scaleMajPent" checked> Major pentatonic</label>
                <label><input type="checkbox" id="scaleMinPent" checked> Minor pentatonic</label>
                <label><input type="checkbox" id="scaleModes" checked> Modes</label>
              </div>
            </div>

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catFunctional" checked> Functional Harmony
              </label>
            </div>

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catIntervals"> Intervals
              </label>
              <div class="category-options" id="intervalsOptions" role="group" aria-label="Interval types">
                <label><input type="checkbox" id="intMin2"  checked> Minor 2nd</label>
                <label><input type="checkbox" id="intMaj2"  checked> Major 2nd</label>
                <label><input type="checkbox" id="intMin3"  checked> Minor 3rd</label>
                <label><input type="checkbox" id="intMaj3"  checked> Major 3rd</label>
                <label><input type="checkbox" id="intPerf4" checked> Perfect 4th</label>
                <label><input type="checkbox" id="intTT"    checked> Tritone</label>
                <label><input type="checkbox" id="intPerf5" checked> Perfect 5th</label>
                <label><input type="checkbox" id="intMin6"  checked> Minor 6th</label>
                <label><input type="checkbox" id="intMaj6"  checked> Major 6th</label>
                <label><input type="checkbox" id="intMin7"  checked> Minor 7th</label>
                <label><input type="checkbox" id="intMaj7"  checked> Major 7th</label>
                <label><input type="checkbox" id="intOct"   checked> Octave</label>
                <div class="option-divider">Direction</div>
                <label><input type="checkbox" id="intDirUp"   checked> Ascending</label>
                <label><input type="checkbox" id="intDirDown" checked> Descending</label>
              </div>
            </div>

            <div class="category">
              <label class="category-header">
                <input type="checkbox" id="catDiatonic"> Diatonic Chords
              </label>
              <div class="category-options" id="diatonicOptions" role="group" aria-label="Diatonic key">
                <div class="key-selector">
                  <span>Key:</span>
                  <select id="diatonicRoot">
                    <option>C</option><option>C#</option><option>D</option><option>Eb</option>
                    <option>E</option><option>F</option><option>F#</option><option>G</option>
                    <option>Ab</option><option>A</option><option>Bb</option><option>B</option>
                  </select>
                  <select id="diatonicMode">
                    <option value="major">Major</option>
                    <option value="minor">Minor</option>
                  </select>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Root Notes -->
      <div class="settings-group">
        <button class="group-toggle" aria-expanded="true">
          <span>Root Notes <span class="settings-hint">— Chords, Scales, Note Finder &amp; Functional Harmony</span></span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="group-body">
          <div class="group-body-inner">
            <div class="notes-grid" role="group" aria-label="Root notes">
              <label><input type="checkbox" data-note="C" checked> C</label>
              <label><input type="checkbox" data-note="C#" checked> C#</label>
              <label><input type="checkbox" data-note="D" checked> D</label>
              <label><input type="checkbox" data-note="Eb" checked> Eb</label>
              <label><input type="checkbox" data-note="E" checked> E</label>
              <label><input type="checkbox" data-note="F" checked> F</label>
              <label><input type="checkbox" data-note="F#" checked> F#</label>
              <label><input type="checkbox" data-note="G" checked> G</label>
              <label><input type="checkbox" data-note="Ab" checked> Ab</label>
              <label><input type="checkbox" data-note="A" checked> A</label>
              <label><input type="checkbox" data-note="Bb" checked> Bb</label>
              <label><input type="checkbox" data-note="B" checked> B</label>
            </div>
          </div>
        </div>
      </div>

      <button id="shuffleBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="16 3 21 3 21 8"></polyline>
          <line x1="4" y1="20" x2="21" y2="3"></line>
          <polyline points="21 16 21 21 16 21"></polyline>
          <line x1="15" y1="15" x2="21" y2="21"></line>
        </svg>
        Shuffle Settings
      </button>

    </section>
  </div>

  <div id="undoToast" class="undo-toast" role="status" aria-live="polite">
    <span>Settings shuffled</span>
    <button id="undoBtn" type="button">Undo</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
